# work-journal hooks for Codex. Codex mirrors Claude Code's hook schema, so the
# same recall.sh / capture.sh scripts are reused verbatim. There is no SessionEnd
# in Codex — Stop is the session-end equivalent.
#
# The script paths below are filled in by install-codex.sh for this checkout.
# If claude isn't on PATH, set WORK_JOURNAL_SUMMARIZER (e.g. to `codex exec`) so
# capture can summarize without it.

[[hooks.SessionStart]]
matcher = "startup|resume"

[[hooks.SessionStart.hooks]]
type = "command"
command = "bash \"__WJ_ROOT__/hooks/recall.sh\""
timeout = 10

[[hooks.Stop]]
matcher = "*"

[[hooks.Stop.hooks]]
type = "command"
command = "bash \"__WJ_ROOT__/hooks/capture.sh\""
timeout = 120
